# =============================================================================
# 活动内容生产工作流 — Docker Compose（适配宿主 nginx 环境）
# 设计文档 v3.2，第十章
# =============================================================================
# 环境特点:
#   - 宿主 nginx 已占用 80/443，负责 TLS 终止和反向代理
#   - 宿主已有 PostgreSQL 占用 5432，本栈 PG 只对内不暴露
#   - n8n 仅绑定 127.0.0.1:5678，由宿主 nginx 代理
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL — n8n 专用（独立于宿主已有的 ossmap-db）
  # ===========================================================================
  postgres:
    image: postgres:16.3-alpine
    container_name: cg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cg-internal

  # ===========================================================================
  # Redis — n8n queue 模式 + 缓存
  # ===========================================================================
  redis:
    image: redis:7.4-alpine
    container_name: cg-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cg-internal

  # ===========================================================================
  # n8n — 直接暴露 8081 端口访问
  # ===========================================================================
  n8n:
    image: n8nio/n8n:1.82.0
    container_name: cg-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:5678"
    environment:
      # --- 数据库 ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # --- 执行模式 (Phase 0 用 regular，后续换 queue) ---
      EXECUTIONS_MODE: ${N8N_EXECUTIONS_MODE:-regular}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_DB: 0

      # --- Webhook URL（飞书回调）---
      N8N_HOST: ${N8N_HOST:-tommylike.me}
      N8N_PROTOCOL: http
      N8N_PORT: 5678
      WEBHOOK_URL: ${WEBHOOK_URL:-https://tommylike.me/}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL:-https://tommylike.me/}

      # --- 安全 ---
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_SECURE_COOKIE: false

      # --- 时区 ---
      GENERIC_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai

      # --- 日志与清理 ---
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}

      # --- 二进制数据 ---
      N8N_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_PATH: /data/n8n-binary

    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_binary:/data/n8n-binary
      - ${PWD}/../brand-assets:/data/brand-assets:ro
      - ${PWD}/../config:/data/config:ro
      - ${PWD}/../scripts:/data/scripts:ro
    networks:
      - cg-internal

networks:
  cg-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  n8n_binary:
