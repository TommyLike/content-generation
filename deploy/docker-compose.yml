# =============================================================================
# 活动内容生产工作流 — Docker Compose 部署配置
# 设计文档 v3.2，第十章
# =============================================================================
# 使用: docker compose up -d
# 注意: 所有镜像版本固定，勿用 latest 标签
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # PostgreSQL — n8n 执行数据持久化 + Wait 节点恢复
  # ===========================================================================
  postgres:
    image: postgres:16.3-alpine
    container_name: cg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cg-internal
    # 不暴露端口到宿主机，仅内网访问

  # ===========================================================================
  # Redis — n8n queue 模式（并发子工作流）+ 缓存
  # ===========================================================================
  redis:
    image: redis:7.4-alpine
    container_name: cg-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cg-internal

  # ===========================================================================
  # n8n — 工作流编排引擎
  # ===========================================================================
  n8n:
    image: n8nio/n8n:1.82.0
    container_name: cg-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # --- 数据库（生产必须 PostgreSQL，不用 SQLite）---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

      # --- 执行模式 ---
      EXECUTIONS_MODE: ${N8N_EXECUTIONS_MODE:-queue}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_DB: 0

      # --- Webhook（飞书回调的公网入口）---
      N8N_HOST: ${N8N_HOST:-your-domain.com}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: ${WEBHOOK_URL:-https://your-domain.com/}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL:-https://your-domain.com/}

      # --- 安全 ---
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}  # 务必设置并备份！
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}

      # --- 时区 ---
      GENERIC_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai

      # --- 日志与清理 ---
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}  # 14天
      EXECUTIONS_DATA_PRUNE_TIMEOUT: 3600

      # --- 节点配置 ---
      NODES_EXCLUDE: ""
      N8N_COMMUNITY_PACKAGES_ENABLED: "false"

      # --- 二进制数据（产物图片/视频暂存）---
      N8N_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_PATH: /data/n8n-binary

    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_binary:/data/n8n-binary
      # 品牌资产只读挂载（n8n Code 节点可读取）
      - ../brand-assets:/data/brand-assets:ro
    networks:
      - cg-internal
    # n8n 管理界面不直接暴露公网，通过 Nginx 反向代理

  # ===========================================================================
  # Nginx — 反向代理 + TLS 终止（公网唯一入口）
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: cg-nginx
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro  # TLS 证书目录
      - nginx_logs:/var/log/nginx
    networks:
      - cg-internal

networks:
  cg-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  n8n_binary:
  nginx_logs:
