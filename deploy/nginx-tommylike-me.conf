# =============================================================================
# tommylike.me Nginx 站点配置（含 n8n 反向代理）
# 路径: /etc/nginx/sites-enabled/tommylike.me
# =============================================================================

upstream paseo_backend {
    server 127.0.0.1:6767;
    keepalive 16;
}

upstream n8n_backend {
    server 127.0.0.1:5678;
    keepalive 16;
}

server {
    listen 80;
    server_name tommylike.me;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name tommylike.me;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    access_log /var/log/nginx/access.log combined;

    # Connection tuning
    keepalive_timeout 120;
    keepalive_requests 1000;
    client_max_body_size 100m;  # 视频上传

    # =========================================================================
    # n8n Webhook（飞书回调 + 子工作流互调 — 公网可达）
    # =========================================================================
    location /webhook/ {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # =========================================================================
    # n8n 管理界面（/n8n/）
    # Phase 0: 开放访问（后续可加 IP 白名单）
    # =========================================================================
    location /n8n/ {
        # 可选: 内网 IP 限制（后续启用）
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;

        proxy_pass http://n8n_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # =========================================================================
    # n8n 静态资源（/static/ /rest/ /assets/ — n8n UI 依赖）
    # =========================================================================
    location ~ ^/(rest|assets|static|css|js|fonts|icons|favicon)/ {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Paseo WebSocket
    # =========================================================================
    location /ws {
        proxy_pass http://paseo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;

        proxy_buffering off;
        proxy_buffer_size 4k;
    }

    # =========================================================================
    # Paseo API
    # =========================================================================
    location /api/ {
        proxy_pass http://paseo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # =========================================================================
    # Paseo MCP
    # =========================================================================
    location /mcp/ {
        proxy_pass http://paseo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # =========================================================================
    # 根路径
    # =========================================================================
    location / {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
