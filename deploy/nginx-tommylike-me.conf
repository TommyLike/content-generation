# =============================================================================
# tommylike.me Nginx 站点配置
# 策略: Paseo 特定路径优先匹配，其余全部走 n8n（零路径维护）
# =============================================================================

upstream paseo_backend {
    server 127.0.0.1:6767;
    keepalive 16;
}

upstream n8n_backend {
    server 127.0.0.1:5678;
    keepalive 16;
}

server {
    listen 80;
    server_name tommylike.me;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name tommylike.me;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    access_log /var/log/nginx/access.log combined;
    keepalive_timeout 120;
    keepalive_requests 1000;
    client_max_body_size 100m;

    # =========================================================================
    # n8n Webhook — 长超时（飞书回调 + 子工作流互调）
    # =========================================================================
    location /webhook/ {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # =========================================================================
    # Paseo WebSocket
    # =========================================================================
    location /ws {
        proxy_pass http://paseo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_buffer_size 4k;
    }

    # =========================================================================
    # Paseo API
    # =========================================================================
    location /api/ {
        proxy_pass http://paseo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # =========================================================================
    # Paseo MCP
    # =========================================================================
    location /mcp/ {
        proxy_pass http://paseo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # =========================================================================
    # 其余所有路径 → n8n（setup/signin/workflow/rest/... 零维护）
    # =========================================================================
    location / {
        proxy_pass http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
