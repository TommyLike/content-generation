# =============================================================================
# Nginx 反向代理配置 — 活动内容生产工作流
# 设计文档 v3.2，第 10.1 节
# =============================================================================
# 约束：
#   - 仅暴露 n8n webhook 路径到公网（/webhook/）
#   - n8n 管理界面（/）限内网/VPN IP 访问
#   - 其他路径一律 404
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # =========================================================================
    # HTTPS 入口（公网）
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name ${N8N_HOST};  # 部署时替换为实际域名

        # TLS 证书
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        client_max_body_size 100m;  # 视频上传需要

        # --- /webhook/ — 飞书回调 + 子工作流互调，公网可达 ---
        location /webhook/ {
            proxy_pass http://n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;  # Wait 节点可能较长
            proxy_send_timeout 300s;
        }

        # --- / — n8n 管理界面，仅内网/VPN ---
        location / {
            # 内网 IP 段 + VPN IP 段
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            # 如需 VPN，添加对应 IP 段
            # allow <VPN_IP_RANGE>;
            deny all;

            proxy_pass http://n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- 其他路径拒绝 ---
        location / {
            return 404;
        }
    }

    # =========================================================================
    # HTTP → HTTPS 重定向
    # =========================================================================
    server {
        listen 80;
        server_name ${N8N_HOST};
        return 301 https://$host$request_uri;
    }
}
